spring.application.name=Hardware
server.port=8082
logging.level.org.springframework.web=DEBUG
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#spring.datasource.url=jdbc:h2:mem:testdb

spring.datasource.url=jdbc:sqlserver://localhost:1433;trustServerCertificate=true;encrypt=true;integratedSecurity=false;databaseName=hardware;
spring.datasource.username=sa
spring.datasource.password=SQL

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
